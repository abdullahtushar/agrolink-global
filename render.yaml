databases:
  - name: agrolink-db
    databaseName: agrolink
    user: agrolink_user
    plan: free

services:
  - type: web
    name: agrolink-web
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py loaddata db_backup.json || true"
    startCommand: "gunicorn agrolink.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrolink-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: RENDER
        value: true
